name: Release

# Pure-Node release. Fires on every v* tag and produces one GitHub release with
# exactly two assets:
#
#   - toneai-nux-skill-v*.zip        (Claude Skill — SKILL.md + the QR generator;
#                                     import at claude.ai for ToneAI in Claude web)
#   - toneai-nux-imprint-v*.zip      (desktop bundle — open in an agent CLI)
#
# No compiled binaries, no OS installers, no Homebrew. The generator is plain
# JavaScript that runs on a bare Node, so distribution is just source in a ZIP.
# The setup wizard, the Bun-compiled binaries, the deb/rpm/pkg/exe installers and
# the pipe installer were all retired in favour of this model (mirrors the
# toneai-katana-imprint release).

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # src/build.js vendors @cordfuse/nux-qr-tool into the skill, so the dep has
      # to be installed before the build runs.
      - name: Install build dependencies
        run: npm ci

      - name: Build
        run: node src/build.js

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> "$GITHUB_OUTPUT"

      - name: Package desktop bundle
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cd dist
          zip -r "../${REPO_NAME}-v${VERSION}.zip" .

      # ToneAI in Claude web and on a phone. SKILL.md + the QR generator, in one
      # ZIP imported at claude.ai under Settings > Skills. No install, no terminal.
      # The sandbox runs the same generator the desktop app runs, so the presets
      # are byte-identical.
      - name: Package Claude Skill
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd dist-skill
          zip -r "../toneai-nux-skill-v${VERSION}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### Claude web and mobile (Claude Skill) — START HERE

            **No terminal, no install, works on your phone.** The easiest way to use ToneAI, and for most players the only one they'll need.

            **Download `toneai-nux-skill-v${{ steps.version.outputs.VERSION }}.zip`** from the Assets below — about 600 KB.

            1. Go to **claude.ai in a web browser** and sign in. (Any plan, including Free. Make sure **code execution** is enabled in your settings — the skill needs it to run the generator.)
            2. Open **Settings → Skills** (it sits beneath Customize).
            3. Click **Upload skill** and choose the ZIP. Don't unzip it first.
            4. Done. ToneAI is now in **every** chat, on the web and in the Claude mobile app.

            > **Import from a browser.** The Claude mobile app has no way to add a custom skill — it does not surface the import screen. Do this once at claude.ai in a browser (a phone browser works). After that the skill is on your account and the mobile app picks it up like any other chat.

            Ask for a tone — *"dial in the Comfortably Numb solo, I'm on a Mighty Plug Pro with a Les Paul"* — and it hands you a QR code. Scan it in the NUX app and play.

            It asks once which NUX device and pickups you have, then remembers.

            ### Desktop (agent CLI)

            For local files and offline use. **This needs Node.js and a command line** — if that's not for you, the skill above gives you the same tones.

            1. **Install Node.js first** if you don't have it — [nodejs.org](https://nodejs.org) (any current LTS).
            2. Download `toneai-nux-imprint-v${{ steps.version.outputs.VERSION }}.zip`, extract it, and open the folder in an agent CLI (Claude Code, Gemini CLI, Codex, OpenCode). Say hello — ToneAI handles the rest.

            No build step: the QR generator is plain JavaScript and runs on a bare Node, with no dependencies and no network calls.

            ---

            If neither path fits your environment, use the [Mighty AI QR web app](https://mighty-ai-qr-web.onrender.com) — same NUX-tone-from-prompt experience, browser-hosted, no install.
          files: |
            *-v*.zip
            dist/.imprint-checksum
          draft: false
          prerelease: false
