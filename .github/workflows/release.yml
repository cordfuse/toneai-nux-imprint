name: Release

# Single unified release pipeline. Fires on every v* tag push and produces a
# single GitHub release with ALL artifacts:
#
#   - install.sh / install.ps1                 (pipe-installer bootstrap, stable name)
#   - toneai-setup.ts                           (TypeScript setup wizard, stable name)
#   - toneai-source.zip                         (lean desktop bundle, stable name)
#   - toneai-nux-qr-imprint-desktop-v*.zip   (lean desktop, runtime npm install)
#   - toneai-nux-qr-imprint-v*.zip           (full ZIP, ~27MB, mobile-compatible)
#   - toneai-setup-{linux-x64,win-x64.exe,mac-arm64,mac-x64}  (Bun-compiled binaries)
#   - toneai-setup.exe                          (Inno Setup Windows installer)
#   - toneai-setup-{VERSION}-macos.pkg          (macOS pkg)
#   - toneai-setup-{VERSION}_amd64.deb          (Debian package)
#   - toneai-setup-{VERSION}-1.x86_64.rpm       (RPM package)
#
# Plus an automated update to the homebrew tap formula.
#
# Replaces the previous setup-release.yml workflow that lived on a static
# 'setup-release' tag. Consolidating eliminates the dual-release confusion
# (Latest-flag bug, ugly tag name, two release pages per version).

on:
  push:
    tags:
      - 'v*'

jobs:

  # ── Product ZIPs ──────────────────────────────────────────────────────────
  build-product:
    name: Build product ZIPs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: node src/build.js

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> "$GITHUB_OUTPUT"

      - name: Package desktop release (lean — no node_modules)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cd dist
          zip -r "../${REPO_NAME}-desktop-v${VERSION}.zip" .

      - name: Install dependencies for full release
        run: npm install --production
        working-directory: dist

      - name: Package full release (with node_modules — mobile compatible)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cd dist
          zip -r "../${REPO_NAME}-v${VERSION}.zip" .

      - name: Stage pipe-installer assets (stable filenames for releases/latest/download/)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO_NAME="${{ github.event.repository.name }}"
          # Source ZIP — same content as desktop ZIP, stable filename (no version)
          cp "${REPO_NAME}-desktop-v${VERSION}.zip" toneai-source.zip
          # Wizard TypeScript source — fetched by install.sh / install.ps1
          cp setup/src/index.ts toneai-setup.ts
          # install.sh and install.ps1 already at workspace root (from checkout)

      - name: Upload product ZIPs + pipe-installer assets as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: product-zips
          path: |
            *-v*.zip
            toneai-source.zip
            toneai-setup.ts
            install.sh
            install.ps1

  # ── Setup wizard binaries (Bun compile, 4 platforms) ─────────────────────
  build-setup-binaries:
    name: Build setup binary ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: toneai-setup-linux-x64
            bun_target: bun-linux-x64
          - os: windows-latest
            target: win-x64
            binary: toneai-setup-win-x64.exe
            bun_target: bun-windows-x64
          - os: macos-latest
            target: mac-arm64
            binary: toneai-setup-mac-arm64
            bun_target: bun-darwin-arm64
          - os: macos-latest
            target: mac-x64
            binary: toneai-setup-mac-x64
            bun_target: bun-darwin-x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build binary
        working-directory: setup
        run: bun build src/index.ts --compile --target=${{ matrix.bun_target }} --outfile ../${{ matrix.binary }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  # ── Setup wizard OS installers (4 targets, depends on binaries) ──────────
  build-setup-installers:
    name: Build setup installer ${{ matrix.target }}
    needs: build-setup-binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: deb
          - os: ubuntu-latest
            target: rpm

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: echo "VERSION=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      # ── Windows — Inno Setup ──────────────────────────────────────────────
      - name: Download Windows binary
        if: matrix.target == 'win'
        uses: actions/download-artifact@v4
        with:
          name: toneai-setup-win-x64.exe

      - name: Build Windows installer
        if: matrix.target == 'win'
        shell: pwsh
        run: |
          choco install innosetup -y
          iscc /DMyAppVersion="${{ steps.version.outputs.VERSION }}" installers\windows\setup.iss

      - name: Upload Windows installer
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: toneai-setup-${{ steps.version.outputs.VERSION }}-windows
          path: installers/windows/Output/*.exe

      # ── macOS pkg ─────────────────────────────────────────────────────────
      - name: Download macOS binaries
        if: matrix.target == 'mac'
        uses: actions/download-artifact@v4
        with:
          pattern: toneai-setup-mac-*
          merge-multiple: true

      - name: Build macOS pkg
        if: matrix.target == 'mac'
        run: |
          chmod +x toneai-setup-mac-arm64 toneai-setup-mac-x64
          bash installers/macos/build-pkg.sh ${{ steps.version.outputs.VERSION }}

      - name: Upload macOS pkg
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: toneai-setup-${{ steps.version.outputs.VERSION }}-macos
          path: installers/macos/dist/*.pkg

      # ── Linux .deb ────────────────────────────────────────────────────────
      - name: Download Linux binary
        if: matrix.target == 'deb'
        uses: actions/download-artifact@v4
        with:
          name: toneai-setup-linux-x64

      - name: Build .deb
        if: matrix.target == 'deb'
        run: bash installers/linux/build-deb.sh ${{ steps.version.outputs.VERSION }}

      - name: Upload .deb
        if: matrix.target == 'deb'
        uses: actions/upload-artifact@v4
        with:
          name: toneai-setup-${{ steps.version.outputs.VERSION }}-linux-deb
          path: installers/linux/dist/*.deb

      # ── Linux .rpm ────────────────────────────────────────────────────────
      - name: Download Linux binary (rpm)
        if: matrix.target == 'rpm'
        uses: actions/download-artifact@v4
        with:
          name: toneai-setup-linux-x64

      - name: Install rpm tools
        if: matrix.target == 'rpm'
        run: sudo apt-get install -y rpm

      - name: Build .rpm
        if: matrix.target == 'rpm'
        run: bash installers/linux/build-rpm.sh ${{ steps.version.outputs.VERSION }}

      - name: Upload .rpm
        if: matrix.target == 'rpm'
        uses: actions/upload-artifact@v4
        with:
          name: toneai-setup-${{ steps.version.outputs.VERSION }}-linux-rpm
          path: installers/linux/dist/*.rpm

  # ── Single release: product ZIPs + all setup artifacts ───────────────────
  release:
    name: Create GitHub Release
    needs: [build-product, build-setup-installers]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ToneAI v${{ steps.version.outputs.VERSION }}
          body: |
            ## ToneAI v${{ steps.version.outputs.VERSION }}

            Tell ToneAI what song or artist you want to sound like. It builds a NUX MightyAmp preset and saves a QR code you scan into the NUX app. Uses your existing AI subscription — no extra API key.

            ## Install

            ### Path 0 — Pipe installer (recommended)

            **macOS / Linux:**
            ```
            curl -fsSL https://github.com/steve-krisjanovs/toneai-nux-qr-imprint/releases/latest/download/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```
            irm https://github.com/steve-krisjanovs/toneai-nux-qr-imprint/releases/latest/download/install.ps1 | iex
            ```

            One-liner. Installs Bun if missing, fetches the setup wizard, downloads ToneAI into `~/toneai`, prints how to launch it. No signed-installer permissions, no manual download, always picks up the latest release.

            ### Path 1 — Setup wizard binary (alternative)

            **Windows:** Download and run `toneai-setup.exe`

            **macOS:**
            ```
            brew tap steve-krisjanovs/tools
            brew install toneai-setup
            toneai-setup
            ```
            Or download `toneai-setup-${{ steps.version.outputs.VERSION }}-macos.pkg` — right-click → Open to bypass Gatekeeper.

            **Linux (Debian/Ubuntu):**
            ```
            sudo dpkg -i toneai-setup_${{ steps.version.outputs.VERSION }}_amd64.deb
            ```

            **Linux (Fedora/RHEL):**
            ```
            sudo rpm -i toneai-setup-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm
            ```

            Run `toneai-setup` — the wizard handles the rest.

            ### Path 2 — Desktop CLI (developers)

            Download `toneai-nux-qr-imprint-desktop-v${{ steps.version.outputs.VERSION }}.zip`, extract, open the folder in any supported agent CLI, say hello — ToneAI handles the rest. First launch installs `node_modules` automatically.

            **Supported agents (any desktop OS — Mac, Windows, Linux):**

            | Agent | Command | Notes |
            |---|---|---|
            | Claude Code | `claude` | Anthropic's CLI |
            | Gemini CLI | `gemini` | Google's official CLI |
            | Codex CLI | `codex` | OpenAI's CLI |
            | OpenCode | `opencode` | Open-source alternative |

            ---

            On first launch ToneAI asks which NUX device you have, where to save QR images, and whether you play guitar or bass. After that it goes straight to work each session.

            ## Not supported

            Web/mobile chat clients are not viable for ToneAI as a recurring tool. Tested 2026-05-04:

            | Surface | Status |
            |---|---|
            | Claude.ai web/mobile chat | ⚠️ Technically works as a one-off, but each new chat requires re-attaching the ZIP and re-prompting. Use Path 1 or Path 2 for repeat use. |
            | Claude Projects | ❌ ZIP uploads not accepted; GitHub-as-knowledge connection doesn't run as the persona |
            | ChatGPT web | ❌ Safety layer rejects the persona-takeover pattern |
            | Gemini web | ❌ Emits a JSON output file instead of running as ToneAI |

            If you can't install Path 1 or Path 2, ToneAI isn't the right shape for your environment. Use the [Mighty AI QR web app](https://mighty-ai-qr-web.onrender.com) — same NUX-tone-from-prompt experience, browser-hosted, no install.
          files: release-assets/**/*
          draft: false
          prerelease: false

  # ── Push dist/ to dist branch (enables jsDelivr + codeload ZIP URL) ─────
  push-dist-branch:
    name: Push dist branch
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist
        run: node src/build.js

      - name: Push dist/ to dist branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "dist: v$(cat ../version.txt)"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:refs/heads/dist

  # ── Homebrew tap update ──────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout toneai repo
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download macOS binaries for sha256
        uses: actions/download-artifact@v4
        with:
          pattern: toneai-setup-mac-*
          merge-multiple: true

      - name: Compute sha256 hashes
        id: hashes
        run: |
          echo "ARM64=$(sha256sum toneai-setup-mac-arm64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "X64=$(sha256sum toneai-setup-mac-x64 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: steve-krisjanovs/homebrew-tools
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tools

      - name: Update formula
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA256_ARM64=${{ steps.hashes.outputs.ARM64 }}
          SHA256_X64=${{ steps.hashes.outputs.X64 }}
          TAG=${{ github.ref_name }}

          cat > homebrew-tools/Formula/toneai-setup.rb << 'FORMULA'
          # Formula for homebrew-tools tap: steve-krisjanovs/homebrew-tools
          # To install:
          #   brew tap steve-krisjanovs/tools
          #   brew install toneai-setup

          class ToneaiSetup < Formula
            desc "Setup wizard for ToneAI — AI-powered NUX MightyAmp tone assistant"
            homepage "https://github.com/steve-krisjanovs/toneai-nux-qr-imprint"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/steve-krisjanovs/toneai-nux-qr-imprint/releases/download/TAG_PLACEHOLDER/toneai-setup-mac-arm64"
                sha256 "ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/steve-krisjanovs/toneai-nux-qr-imprint/releases/download/TAG_PLACEHOLDER/toneai-setup-mac-x64"
                sha256 "X64_PLACEHOLDER"
              end
            end

            def install
              bin.install Dir["toneai-setup-mac-*"].first => "toneai-setup"
            end

            test do
              assert_match "ToneAI", shell_output("#{bin}/toneai-setup --help 2>&1 || true")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" homebrew-tools/Formula/toneai-setup.rb
          sed -i "s/TAG_PLACEHOLDER/$TAG/g" homebrew-tools/Formula/toneai-setup.rb
          sed -i "s/ARM64_PLACEHOLDER/$SHA256_ARM64/" homebrew-tools/Formula/toneai-setup.rb
          sed -i "s/X64_PLACEHOLDER/$SHA256_X64/" homebrew-tools/Formula/toneai-setup.rb

      - name: Commit and push
        run: |
          cd homebrew-tools
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/toneai-setup.rb
          git commit -m "toneai-setup: v${{ steps.version.outputs.VERSION }}"
          git push
